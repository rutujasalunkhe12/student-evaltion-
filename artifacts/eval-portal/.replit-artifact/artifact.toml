kind = "web"
previewPath = "/"
title = "EvalPortal - Academic Project Evaluation System"
version = "1.0.0"
id = "artifacts/eval-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19330

[services.development]
run = "pnpm --filter @workspace/eval-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eval-portal", "run", "build" ]
publicDir = "artifacts/eval-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19330"
BASE_PATH = "/"
