services:
  - type: web
    name: eval-portal-api
    env: node
    plan: free
    buildCommand: pnpm --filter @workspace/api-server build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eval-portal-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: eval-portal-db
    plan: free
